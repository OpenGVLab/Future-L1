# SEED-Bench-R1 L1 — aligned with TwiFF ``eval/SeedBenchR1`` (disable_options + gencot judge).
dataset_path: /path/to/your/data/Future-L1-Bench/SEED-Bench-R1/SEED-Bench-R1-L1
dataset_kwargs:
  load_from_disk: True
  cache_dir: /path/to/your/data/Future-L1-Bench/SEED-Bench-R1/videos
task: seedbench_r1_l1_oe
test_split: test
output_type: generate_until
doc_to_visual: !function utils.seedbench_r1_oe_doc_to_visual
doc_to_text: !function utils.seedbench_r1_oe_doc_to_text
doc_to_target: !function utils.seedbench_r1_oe_doc_to_target

# ``inference_SeedBenchR1_TwiFF_mp.py`` uses ``max_think_token_n=4096`` for interleaved CoT.
generation_kwargs:
  max_new_tokens: 4096
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false

process_results: !function utils.seedbench_r1_oe_process_results

lmms_eval_specific_kwargs:
  default: {}

metric_list:
  - metric: seedbench_r1_oe_score
    aggregation: !function utils.seedbench_r1_oe_aggregate_results
    higher_is_better: true

metadata:
  - version: 0.0
